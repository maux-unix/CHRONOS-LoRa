name: Doxygen Documentation

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  doxygen:
    runs-on: ubuntu-24.04-arm

    permissions:
      contents: write

    steps:
      # 1. Checkout source
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Install required tools
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            clang clang-format clang-tidy lld ninja-build graphicsmagick \
            libgraphicsmagick++1-dev liblgpio-dev \
            doxygen doxygen-awesome-css graphviz \
            ./thirdparty/WiringPi/wiringpi_3.18_arm64.deb

      # 3. Build project (this is where compile_commands.json is generated)
      - name: Build project with Ninja
        run: |
          ninja -v

      # 4. Verify compile database exists
      - name: Validate compile_commands.json
        run: |
          test -f build/compile_commands.json
          ls -lah build/compile_commands.json

      - name: Deploy documentation
        uses: DenverCoder1/doxygen-github-pages-action@v2.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: gh-pages
          folder: docs/html
          config_file: Doxyfile
          doxygen_version: 1.9.6
