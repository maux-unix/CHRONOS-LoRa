name: Doxygen Documentation

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  doxygen:
    runs-on: ubuntu-24.04-arm

    permissions:
      contents: write

    steps:
      # 1. Checkout source
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Install required tools
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang clang-format clang-tidy lld ninja graphicsmagick \
            libgraphicsmagick++1-dev liblgpio-dev \
            doxygen doxygen-awesome-css graphviz \
            thirdparty/WiringPi/wiringpi_3.18_arm64.deb

      # 3. Build project (this is where compile_commands.json is generated)
      - name: Build project with Ninja
        run: |
          ninja -v

      # 4. Verify compile database exists
      - name: Validate compile_commands.json
        run: |
          test -f build/compile_commands.json
          ls -lah build/compile_commands.json

      # 5. Generate documentation
      - name: Run Doxygen
        run: |
          doxygen Doxyfile

      # 6. Deploy to GitHub Pages
      - name: Deploy documentation
        uses: JamesIves/github-pages-deploy-action@releases/v3
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: gh-pages
          FOLDER: docs/html
