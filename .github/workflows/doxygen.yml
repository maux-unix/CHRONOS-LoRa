name: Doxygen (Docker ARM Environment)

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - uses: actions/checkout@v4

      # 2. Enable Docker Buildx (multi-arch support)
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Run everything inside ARM64 Debian container
      - name: Build inside Raspberry Pi-like environment
        run: |
          docker run --rm \
            -v $PWD:/workspace \
            -w /workspace \
            arm64v8/debian:bookworm bash -c "
              apt-get update &&
              apt-get install -y \
                doxygen \
                graphviz \
                ninja-build \
                clang \ 
                graphicsmagick \
                libgraphicsmagick++1-dev &&

              echo 'Building project...' &&
              ninja &&

              echo 'Generating docs...' &&
              doxygen Doxyfile
            "

      # 4. Deploy (runs on host, not inside container)
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@releases/v3
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: gh-pages
          FOLDER: docs/html
